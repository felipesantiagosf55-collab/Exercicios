<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primero script</title>
</head>
<body>
    
    <script>
        var nome = window.prompt('Qual o seu nome?')
        document.write(`Ola ${nome}, seu nome tem ${nome.length} letras <br/>`)
        document.write(`Seu nome em letras muscúlas é ${nome.toUpperCase()} <br/>`)
        document.write(`Seu nome em letras minuscúlas é ${nome.toLowerCase()}`)
    </script>
</body>
</html>
