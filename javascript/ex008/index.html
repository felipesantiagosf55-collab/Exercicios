<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Vamos Contar</h1>
    </header>
    <section>
        <p>
            <label for="inic">Começa:</label>
            <input type="number" name="inic" id="inic">
        </p>
        <p>
            <label for="termi">Termina:</label>
            <input type="number" name="termi" id="termi">
        </p>
        <p>
            <label for="pula">Pula:</label>
            <input type="number" name="pula" id="pula">
        </p>
        <p>
            <input type="button" value="Contar" onclick="contar()">
        </p>

        <div id="res">
            Preparando a contagem...
        </div>
    </section>

    <script src="script.js"></script>

</body>
</html>
