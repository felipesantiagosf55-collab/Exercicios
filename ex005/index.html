<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }
        .form {
            background-color: bisque;
            margin-right: 300px;
        }
    </style>
</head>
<body>
    <h1>Meu primeiro formulário</h1>

    <form action="cadastro.php" method="post" autocomplete="on"> 
        <!--
        METHOD = Usar 'POST' quando for algum conteudo sensível que você não queira que apareca na "URL", se nao usar 'GET'! ou quando você tem alguma informação que passe de 3000byts.
        -->
        <p>
            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="nome" required size="12" placeholder="Nome do Usuário" autocomplete="username"> <!--
            REQUIRED = se o campo não for preenchido, ele manda uma msg dixendo que o camp não foi preenchido

            PLACEHOLDER = deixa um texto pré escrito

            AUTOCOMPLETE = é para dizer que essa caixa é uma caixa de nome, senha, e-mail ..., mas para isso tenho que deixar o AUTOCOMPLETE ON na tegue 'form'
            -->
        </p>
        <p>
            <label for="iSobrenome">Sobrenome:</label>
            <input type="text" name="Sobrenome" id="iSobrenome" required size="17" placeholder="Sobrenome do Usuário"> <!--
            SIZE = a caixa tera um tamanho mínimo. Não afetra em nada somente no tamanho da caixa-->
        </p>
        <p>
            <label for="isenha">Senha:</label>
            <input type="password" name="Senha" id="isenha" required minlength="8" maxlength="20"> <!--
            MINLENGTH = exige um número mínimo de caracter e MAXLENGTH = exige um número maximo de caracter-->
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form >
    <br>
    <br>
    <h1>Teste de formulário</h1>
    <h2>Nota e Data</h2>
    <form action="cadastro.php" class="form">
        <p>
            <label for="inome">Nome:</label>
            <input type="text" name="nome" id="inome">
        </p>
        <p>
            <label for="inota">Nota:</label>
            <input type="number" name="nota" id="inota" min="0" max="10" placeholder="0 a 10" step="0.1"> <!--
            STEP = passo, de quanto em quanto a nota vai mudando-->
        </p>
        <p>
            <label for="imes">Data</label>
            <input type="date" name="data" id="imes">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
    <br>
    <br>
    <h1>Teste de formulário</h1>
    <h2>E-mail e Telefone</h2>
    <form action="cadastro.php">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <p>
                <label for="iemail">Email:</label>
                <input type="email" name="email" id="iemail">
            </p>
            <p>
                <label for="itelefone">Telefone:</label>
                <input type="tel" name="telefone" id="itelefone" pattern="^\(\d{2}\)\d{5}-\d{4}$" placeholder="(xx)xxxxx-xxxx">
            </p>
            <p>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </p>
        </fieldset>
    </form>
    <br>
    <br>
    <h1>Teste de formulário</h1>
    <h2>Botões para selecionar</h2>
    <form action="cadstro.php">
        <fieldset>
            <legend>Sexo</legend>
            <input type="radio" name="sexo" id="imasc" value="M"><label for="imasc">Mascolino</label>
            <input type="radio" name="sexo" id="ifemin" value="F"><label for="ifemin">Feminino</label>
            <!--Para deixar so uma opção marcada eu tenho que colocar a mesma coisa no "name"-->
        </fieldset>
        <br>
        <fieldset>
            <legend>Esportes Favoritos</legend>

            <input type="checkbox" name="basq" id="ibasq"><label for="ibasq">Basquete</label> <br>

            <input type="checkbox" name="fut" id="ifut"><label for="ifut">Futebol</label> <br>

            <input type="checkbox" name="vol" id="ivol"><label for="ivol">Volei</label> <br>

            <input type="checkbox" name="ten" id="iten"><label for="iten">Tênis</label> <br>

            <input type="checkbox" name="nat" id="inat"><label for="inat">Natação</label> <br>

        </fieldset>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
    <br>
    <br>
    <h1>Teste de formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <p>
            <label for="in1">Numero 1:</label>
            <input type="number" name="n1" id="in1" min="0" max="50" required oninput="isoma.innerHTMl = Number(in1.value) + Number(in2.value)">
        </p>
        <p>
            <label for="in2">Numero 2:</label>
            <input type="number" name="n2" id="in2" min="0" max="50" required oninput="isoma.innerHTMl = Number(in1.value) + Number(in2.value)">
        </p>
        <p>
            <label for="isoma">Soma: </label>
            <output name="soma" id="isoma">0</output>
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>
</body>
</html>
